name: Release
on:
  push:
    tags: ['v*.*.*']
permissions:
  contents: write
  id-token: write
  attestations: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest==8.4.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Create source archive
        shell: bash
        run: |
          mkdir release
          git archive --format=tar.gz --prefix=reproproof-${GITHUB_REF_NAME}/ -o release/reproproof-${GITHUB_REF_NAME}.tar.gz HEAD
          sha256sum release/* > release/SHA256SUMS
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/reproproof-${{ github.ref_name }}.tar.gz
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "ReproProof $GITHUB_REF_NAME"
