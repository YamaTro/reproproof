name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Enable pnpm
        run: corepack enable
      - name: Install pytest for the Python fixture
        run: python -m pip install pytest==8.4.1
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Verify
        run: pnpm check
